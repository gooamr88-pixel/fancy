# Nginx Server Block Configuration for fancyrsvp.com
# Save this file to /etc/nginx/sites-available/fancy-rsvp
# Create a symlink to enable it:
# sudo ln -s /etc/nginx/sites-available/fancy-rsvp /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload nginx: sudo systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=public:10m rate=10r/s;

# HTTP → HTTPS redirect (all traffic)
server {
    listen 80;
    listen [::]:80;
    server_name fancyrsvp.com www.fancyrsvp.com;

    server_tokens off;

    # Allow Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fancyrsvp.com www.fancyrsvp.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/fancyrsvp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fancyrsvp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Hide Nginx version
    server_tokens off;

    # Client uploads configuration. Must be >= the Express body limit (50mb, see
    # backend/app.js) or authenticated CSV/image uploads between 20–50 MB are
    # rejected here with a raw nginx 413 before Express ever sees them. Public
    # RSVP writes are separately capped at 64kb inside Express.
    client_max_body_size 50M;

    # Compression (Gzip)
    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection removed — deprecated in modern browsers and can introduce side-channel attacks
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Kept in sync with frontend/next.config.mjs (both edge layers emit a CSP; the
    # browser enforces the intersection, so they MUST allow the same sources or a
    # legitimate resource silently breaks). Any change here must be mirrored there.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://maps.googleapis.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://accounts.google.com https://oauth2.googleapis.com https://maps.googleapis.com https://challenges.cloudflare.com https://fancyrsvp.com; frame-src 'self' https://accounts.google.com https://www.google.com https://maps.googleapis.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # Proxy timeouts
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # 1. Express Backend API - Auth endpoints (strict rate limit)
    location /api/v1/auth {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Express Backend API - Public endpoints (moderate rate limit)
    location /api/v1/public {
        limit_req zone=public burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Express Backend API - All other endpoints (standard rate limit)
    location /api {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Next.js Frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Serve Next.js static files directly if cached
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        # An `add_header` in a location block REPLACES (does not merge) the
        # server-level headers, so the security headers above are dropped for
        # every static asset unless repeated here. Re-declare the load-bearing
        # ones alongside the long-cache header.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
        access_log off;
    }
}
