name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22  # matches deployment/README.md's Node 22 LTS install step — keep in sync
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Blocking: verified clean at this threshold as of 2026-07 (only moderate
      # advisories exist, both requiring a breaking-change upgrade to clear —
      # see uuid/exceljs in backend, postcss/next in frontend). If a real high/
      # critical advisory ever lands, fix it or vet+pin rather than reintroducing `|| true`.
      - run: npm audit --audit-level=high
      - run: npm test

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22  # matches deployment/README.md's Node 22 LTS install step — keep in sync
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Blocking: verified clean at this threshold as of 2026-07 (only moderate
      # advisories exist, both requiring a breaking-change upgrade to clear —
      # see uuid/exceljs in backend, postcss/next in frontend). If a real high/
      # critical advisory ever lands, fix it or vet+pin rather than reintroducing `|| true`.
      - run: npm audit --audit-level=high
      # Advisory only: the unescaped-entities debt is cleared (2026-07), but
      # ~44 react-hooks/set-state-in-effect errors remain — each needs a
      # per-case behavioral review (lazy initial state vs. derived-in-render
      # vs. a genuine external-sync effect), not a mechanical fix. Surface it
      # without failing the pipeline; the build below is the real gate.
      # Flip to blocking once that debt is paid.
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
        env:
          # Public build-time defaults; real values are injected at deploy time.
          NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
